project_id = "leotcbfpqiekgkgumecn"

[functions.finalize-checkout]
verify_jwt = false

[functions.force-signout]
verify_jwt = false

# Supabase Auth "Send Email" hook — called by Auth without a user JWT.
# Authenticates internally via Standard Webhooks signature (SEND_EMAIL_HOOK_SECRET).
[functions.send-auth-email]
verify_jwt = false

# Public — caller proves identity via the raw invite token (delivered to the
# invitee's mailbox), so a user JWT is not required.
[functions.confirm-invite-email]
verify_jwt = false

# Public — caller proves identity via a one-time token from the email-change
# confirmation email sent to the new mailbox. No user JWT required.
[functions.confirm-email-change]
verify_jwt = false

# Internal cron-invoked sweeper — authenticates via x-internal-secret header
# (SUPABASE_SERVICE_ROLE_KEY). No user JWT is presented by pg_cron.
[functions.process-storage-deletion-jobs]
verify_jwt = false
